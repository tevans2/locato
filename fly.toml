app = "locato"
primary_region = "jnb"

[env]
  NODE_ENV = "production"
  ROOM_TTL_SECONDS = "7200"
  MAX_PLAYERS_PER_ROOM = "8"
  MAX_ROOMS = "500"
  ANSWER_RATE_LIMIT_PER_SECOND = "5"
  DATABASE_PATH = "/data/locato.db"
  # BASE_URL is set as a Fly secret (not here) since it contains the domain name.

# Persistent SQLite for user accounts. Create before first deploy:
# fly volumes create data -a locato --size 1 --region jnb
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
