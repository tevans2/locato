name: Deploy to Fly (staging)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: fly-deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Test, build, and deploy staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly (staging)
        # fly.staging.toml already targets the locato-staging app.
        run: >
          flyctl deploy --remote-only --config fly.staging.toml
          --build-arg VITE_GOOGLE_MAPS_EMBED_API_KEY="$VITE_GOOGLE_MAPS_EMBED_API_KEY"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
          VITE_GOOGLE_MAPS_EMBED_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_EMBED_API_KEY_STAGING }}
      
